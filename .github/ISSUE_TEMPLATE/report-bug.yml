name: Report a Website Problem
description: Something on the website is broken, looks wrong, or is not working as expected. Let us know!
title: "Bug: [Short description of the problem]"
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Use this form to report a problem with the website. The more detail you provide, the faster it can be fixed.

  - type: textarea
    id: what-happened
    attributes:
      label: What went wrong?
      description: Describe the problem clearly. What did you see or experience that was unexpected?
      placeholder: e.g., When I click the "Sign Up" button for Soccer Team, nothing happens and the student is not added.
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: What should have happened instead?
      description: Describe what you expected to see or happen.
      placeholder: e.g., The student's name should appear in the participant list after clicking "Sign Up".
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to reproduce the problem
      description: List the exact steps someone would take to see the problem. Be as specific as possible.
      placeholder: |
        1. Open the website
        2. Find the "Soccer Team" activity card
        3. Type a student email address in the sign-up box
        4. Click "Sign Up"
        5. Nothing happens — the participant list does not update
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Which part of the website is affected?
      options:
        - Activity list (the cards showing all activities)
        - Signing up a student for an activity
        - Removing a student from an activity
        - Filtering or searching activities
        - Teacher login
        - Page layout or appearance (colors, fonts, spacing)
        - Other
    validations:
      required: true

  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: |
        Any other information that might help — for example, which browser you are using, which activity or student is affected, or a screenshot description.
      placeholder: Optional — leave blank if there is nothing else to add.
    validations:
      required: false

  - type: markdown
    attributes:
      value: |
        ### For the developer implementing this fix

        **What needs to be done:**
        1. Reproduce the problem using the steps provided above.
        2. Identify the root cause in the Python backend (`src/backend/`) or the frontend (`src/static/`).
        3. Fix the issue so the behavior matches the expected behavior described above.
        4. Verify the fix does not break any other part of the website.

        **Acceptance criteria:**
        - The problem described above no longer occurs.
        - The website behaves as expected when following the reproduction steps.
        - No new errors are introduced.
